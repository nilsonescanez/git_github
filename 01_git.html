    Git é uma ferramenta de versionamento. <br>

Ele permite guardar o histórico de mudanças de um projeto. <br>

Versionar é: <br>
- Registrar alterações ao longo do tempo <br>
- Saber quem mudou <br>
- Saber quando mudou <br>
- Entender o porquê da mudança <br>

É uma ferramenta instalada localmente no computador. <br>
